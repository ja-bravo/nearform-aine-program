name: Test Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: 22
  PNPM_VERSION: 9.0.0
  DATABASE_URL: postgresql://todo:todo@localhost:5432/todo
  NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
  BURN_IN_ITERATIONS: 5

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm turbo run lint
      - name: Typecheck
        run: pnpm turbo run typecheck

  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm turbo run build

  test-unit:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: todo
          POSTGRES_DB: todo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        run: pnpm turbo run test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          RUN_DB_TESTS: "1"

  test-e2e:
    name: E2E (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: todo
          POSTGRES_DB: todo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: pnpm turbo run test:e2e -- --shard=${{ matrix.shard || 1 }}/4
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXT_PUBLIC_API_BASE_URL: ${{ env.NEXT_PUBLIC_API_BASE_URL }}
      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-shard-${{ matrix.shard }}
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 30

  burn-in:
    name: Burn-In (Flaky Detection)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: test-e2e
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: todo
          POSTGRES_DB: todo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git diff
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Detect changed E2E specs
        id: changed-specs
        run: |
          # Detect changed test files in apps/web/e2e
          CHANGED=$(git diff --name-only origin/main...HEAD | grep -E '^apps/web/e2e/.*\.spec\.ts$' || true)
          if [ -n "$CHANGED" ]; then
            # Format specs for Playwright (passing filenames)
            echo "specs=$CHANGED" >> "$GITHUB_OUTPUT"
            echo "Changed specs: $CHANGED"
          else
            echo "specs=" >> "$GITHUB_OUTPUT"
            echo "No changed E2E specs found"
          fi
      - name: Run burn-in loop (5 iterations)
        if: steps.changed-specs.outputs.specs != ''
        env:
          SPECS: ${{ steps.changed-specs.outputs.specs }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXT_PUBLIC_API_BASE_URL: ${{ env.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          # Security: inputs passed through env: to prevent script injection
          echo "🔥 Starting burn-in loop for changed specs"
          for i in $(seq 1 ${{ env.BURN_IN_ITERATIONS }}); do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔥 Burn-in iteration $i/${{ env.BURN_IN_ITERATIONS }}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            # Security: SPECS referenced as env var
            pnpm turbo run test:e2e -- "$SPECS" || exit 1
          done
          echo "✅ Burn-in complete - no flaky tests detected"
      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-failures
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 7

  report:
    name: Final Summary
    runs-on: ubuntu-latest
    needs: [test-unit, test-e2e, burn-in]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Quality Gate Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit & Integration | ${{ needs.test-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E (Sharded) | ${{ needs.test-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Burn-in (Flaky Detection) | ${{ needs.burn-in.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.test-e2e.result }}" == "failure" ] || [ "${{ needs.burn-in.result }}" == "failure" ]; then
            echo "### ⚠️ Failures Detected" >> $GITHUB_STEP_SUMMARY
            echo "Please review the uploaded artifacts for traces, screenshots, and HTML reports." >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.burn-in.result }}" == "failure" ]; then
            echo "#### 🔥 Flaky Tests Warning" >> $GITHUB_STEP_SUMMARY
            echo "The burn-in loop detected instability in recently changed tests. Fix flakiness before merging." >> $GITHUB_STEP_SUMMARY
          fi
