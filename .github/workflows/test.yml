name: Test Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: 22
  PNPM_VERSION: 9.0.0
  DATABASE_URL: postgresql://todo:todo@localhost:5432/todo
  NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
  BURN_IN_ITERATIONS: 5
  TURBO_CACHE_DIR: .turbo

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Lint
        run: pnpm turbo run lint
      - name: Typecheck
        run: pnpm turbo run typecheck

  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Build
        run: pnpm turbo run build

  test-unit:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: todo
          POSTGRES_DB: todo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Run unit tests with coverage
        run: pnpm turbo run test:coverage
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          RUN_DB_TESTS: "1"
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: apps/*/coverage/
          retention-days: 14

  test-e2e:
    name: E2E (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: todo
          POSTGRES_DB: todo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: pnpm turbo run test:e2e -- --project=chromium --shard=${{ matrix.shard || 1 }}/4
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXT_PUBLIC_API_BASE_URL: ${{ env.NEXT_PUBLIC_API_BASE_URL }}
      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-shard-${{ matrix.shard }}
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 30

  burn-in:
    name: Burn-In (Flaky Detection)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: test-e2e
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: todo
          POSTGRES_DB: todo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git diff
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Restore Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Detect changed E2E specs
        id: changed-specs
        run: |
          # Detect changed test files in apps/web/e2e
          CHANGED=$(git diff --name-only origin/main...HEAD | grep -E '^apps/web/e2e/.*\.spec\.ts$' || true)
          if [ -n "$CHANGED" ]; then
            # Format specs for Playwright (passing filenames)
            echo "specs=$CHANGED" >> "$GITHUB_OUTPUT"
            echo "Changed specs: $CHANGED"
          else
            echo "specs=" >> "$GITHUB_OUTPUT"
            echo "No changed E2E specs found"
          fi
      - name: Run burn-in loop (5 iterations)
        if: steps.changed-specs.outputs.specs != ''
        env:
          SPECS: ${{ steps.changed-specs.outputs.specs }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXT_PUBLIC_API_BASE_URL: ${{ env.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          # Security: inputs passed through env: to prevent script injection
          echo "🔥 Starting burn-in loop for changed specs"
          for i in $(seq 1 ${{ env.BURN_IN_ITERATIONS }}); do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔥 Burn-in iteration $i/${{ env.BURN_IN_ITERATIONS }}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            # Security: SPECS referenced as env var
            pnpm turbo run test:e2e -- --project=chromium "$SPECS" || exit 1
          done
          echo "✅ Burn-in complete - no flaky tests detected"
      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-failures
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 7

  quality-gate:
    name: Performance & Accessibility Gate
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: todo
          POSTGRES_DB: todo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Build
        run: pnpm turbo run build
      - name: Start API
        run: pnpm --filter api start > api.log 2>&1 &
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Start Web
        run: pnpm --filter web start > web.log 2>&1 &
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ env.NEXT_PUBLIC_API_BASE_URL }}
      - name: Wait for services
        run: |
          npx wait-on --timeout 120000 http://localhost:3001/healthz/ready http://localhost:3000/ || {
            echo "❌ Services failed to start within 120s"
            echo "--- API Logs ---"
            [ -f api.log ] && cat api.log || echo "api.log not found"
            echo "--- Web Logs ---"
            [ -f web.log ] && cat web.log || echo "web.log not found"
            exit 1
          }
      - name: Axe-core & Responsive checks
        run: pnpm turbo run quality-gate
        env:
          SKIP_PW_WEBSERVER: "1"
          BASE_URL: http://localhost:3000
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./apps/web/.lighthouserc.js
          uploadArtifacts: true
          temporaryPublicStorage: true
      - name: Setup K6
        uses: grafana/setup-k6-action@v1
      - name: Run k6 Load Tests
        uses: grafana/run-k6-action@v1
        with:
          path: perf/k6/api-read-scenarios.js
          flags: --summary-export=k6-summary.json
        env:
          K6_API_BASE_URL: http://localhost:3001
      - name: Check k6 budgets
        run: |
          if [[ ! -f k6-summary.json ]]; then
            echo "❌ k6 summary file missing!"
            exit 1
          fi
          
          # CRUD p95 check
          P95=$(jq '.metrics.http_req_duration.values."p(95)"' k6-summary.json)
          THRESHOLD=$(jq '.http_req_duration.p95' perf/budgets/api-budgets.json)
          
          # Initial load p95 check
          LOAD_P95=$(jq '.metrics.initial_load_duration.values."p(95)"' k6-summary.json)
          LOAD_THRESHOLD=$(jq '.initial_load_p95' perf/budgets/api-budgets.json)
          
          echo "k6 CRUD p95: $P95 ms (threshold: $THRESHOLD ms)"
          echo "k6 Initial Load p95: $LOAD_P95 ms (threshold: $LOAD_THRESHOLD ms)"
          
          if [[ ! "$P95" =~ ^[0-9.]+$ ]] || [[ ! "$THRESHOLD" =~ ^[0-9.]+$ ]]; then
            echo "❌ Invalid CRUD performance data"
            exit 1
          fi
          
          if (( $(echo "$P95 > $THRESHOLD" | bc -l) )); then
            echo "❌ API CRUD performance budget exceeded!"
            exit 1
          fi
          
          if [[ "$LOAD_P95" != "null" && "$LOAD_THRESHOLD" != "null" ]]; then
            if (( $(echo "$LOAD_P95 > $LOAD_THRESHOLD" | bc -l) )); then
              echo "❌ API Initial Load performance budget exceeded!"
              exit 1
            fi
          fi
          
          echo "✅ API performance within budget"
      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports
          path: |
            k6-summary.json
            api.log
            web.log
          retention-days: 14

  report:
    name: Final Summary
    runs-on: ubuntu-latest
    needs: [test-unit, test-e2e, burn-in, quality-gate]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Quality Gate Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit & Integration | ${{ needs.test-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E (Sharded) | ${{ needs.test-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Burn-in (Flaky Detection) | ${{ needs.burn-in.result || 'Skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance & Accessibility | ${{ needs.quality-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.test-e2e.result }}" == "failure" ] || [ "${{ needs.burn-in.result }}" == "failure" ]; then
            echo "### ⚠️ Failures Detected" >> $GITHUB_STEP_SUMMARY
            echo "Please review the uploaded artifacts for traces, screenshots, and HTML reports." >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.burn-in.result }}" == "failure" ]; then
            echo "#### 🔥 Flaky Tests Warning" >> $GITHUB_STEP_SUMMARY
            echo "The burn-in loop detected instability in recently changed tests. Fix flakiness before merging." >> $GITHUB_STEP_SUMMARY
          fi
